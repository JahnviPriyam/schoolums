services:
  db:
    image: postgres:15-alpine
    restart: always
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  auth-service:
    build: ./backend/auth-service
    ports:
      - "8000:8000"
    environment:
      - ENABLE_DEMO_USERS=true
    env_file: .env
    depends_on:
      - db
    volumes:
      - ./backend/auth-service:/app

  student-service:
    build: ./backend/student-service
    ports:
      - "8001:8001"
    volumes:
      - ./backend/student-service:/app

  exam-service:
    build: ./backend/exam-service
    ports:
      - "8002:8002"
    volumes:
      - ./backend/exam-service:/app

  timetable-service:
    build: ./backend/timetable-service
    ports:
      - "8003:8003"
    volumes:
      - ./backend/timetable-service:/app

  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "9000:9000"
    depends_on:
      - auth-service
      - student-service
      - exam-service
      - timetable-service

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"

volumes:
  postgres_data: