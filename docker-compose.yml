services:
  auth-service:
    build: ./backend/auth-service
    ports:
      - "8000:8000"
    volumes:
      - ./backend/auth-service:/app

  student-service:
    build: ./backend/student-service
    ports:
      - "8001:8001"
    volumes:
      - ./backend/student-service:/app

  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "9000:9000"
    depends_on:
      - auth-service
      - student-service

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"